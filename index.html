<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的YouTube新聞廣播器 & RSS閱讀器</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        .tab-buttons { text-align: center; margin: 20px 0; }
        .tab-buttons button {
            padding: 10px 20px;
            margin: 0 10px;
            font-size: 18px;
            cursor: pointer;
            background: #ddd;
            border: none;
            border-radius: 5px;
        }
        .tab-buttons button.active { background: #4CAF50; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #player { width: 100%; max-width: 800px; height: 450px; margin: 20px auto; border: 1px solid #ccc; }
        #status, #reader-status { font-size: 18px; margin: 20px; color: #333; }
        .video-list { max-width: 800px; margin: 0 auto; }
        .video-item {
            border: 1px solid #ccc;
            margin: 15px 0;
            padding: 15px;
            border-radius: 8px;
            background: white;
            text-align: left;
        }
        .video-item img { max-width: 100%; height: auto; border-radius: 5px; }
        .transcript, .summary { margin-top: 10px; font-size: 14px; background: #f9f9f9; padding: 10px; border-radius: 5px; max-height: 300px; overflow-y: auto; }
        button { padding: 8px 16px; font-size: 14px; cursor: pointer; margin: 5px; background: #2196F3; color: white; border: none; border-radius: 4px; }
        button:hover { background: #1976D2; }
    </style>
</head>
<body>

    <div class="tab-buttons">
        <button id="tab-broadcast" class="active">廣播器（自動播放）</button>
        <button id="tab-reader">RSS 閱讀器</button>
    </div>

    <div id="broadcast-content" class="tab-content active">
        <h1>自動播放最新內容（@nullmicgo）</h1>
        <div id="player"></div>
        <p id="status">正在載入最新視頻...</p>
        <button id="refreshBtn">重新載入最新</button>
    </div>

    <div id="reader-content" class="tab-content">
        <h1>RSS 閱讀器 - 最新影片列表與摘要</h1>
        <p id="reader-status">點擊 tab 後自動載入最新 1 則（每個頻道）...</p>
        <div id="video-list" class="video-list"></div>
        <button id="refresh-reader">重新整理閱讀器</button>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const YOUTUBE_API_KEY = 'AIzaSyDrloDZ0w8qFvwVYi_w-xJ-yJd8bigNa9I';          // ← 填入
        const SUPADATA_API_KEY = 'sd_55cac8442592c7e440da5ca2ea7f2fc7';     // ← 填入 Supadata key
        const OPENROUTER_API_KEY = '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';       // ← 填入 OpenRouter key

        const CHANNELS = [
            { id: 'UCtSCw2_rVZKXb_8Uo9trStQ', name: 'nullmicgo' },
            { id: 'UC6ly-Z341muZIdYGp5LGyBw', name: 'AInvest Official' }
        ];

        let player;

        // Tab 切換
        document.getElementById('tab-broadcast').addEventListener('click', () => {
            document.getElementById('broadcast-content').classList.add('active');
            document.getElementById('reader-content').classList.remove('active');
            document.getElementById('tab-broadcast').classList.add('active');
            document.getElementById('tab-reader').classList.remove('active');
        });

        document.getElementById('tab-reader').addEventListener('click', () => {
            document.getElementById('reader-content').classList.add('active');
            document.getElementById('broadcast-content').classList.remove('active');
            document.getElementById('tab-reader').classList.add('active');
            document.getElementById('tab-broadcast').classList.remove('active');
            loadReader();
        });

        async function getLatestVideos(channelId, max = 1) {  // 改為 max=1
            try {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=${max}&order=date&type=video&key=${YOUTUBE_API_KEY}`;
                const res = await fetch(url);
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error?.message || res.status);
                }
                const data = await res.json();
                return data.items.map(item => ({
                    videoId: item.id.videoId,
                    title: item.snippet.title,
                    publishedAt: new Date(item.snippet.publishedAt).toLocaleString('zh-TW'),
                    thumbnail: item.snippet.thumbnails.medium.url,
                    channelName: CHANNELS.find(c => c.id === channelId)?.name || '未知'
                }));
            } catch (e) {
                console.error(e);
                return [];
            }
        }

        async function getTranscript(videoId) {
            try {
                let url = `https://api.supadata.ai/v1/transcript?url=https://youtu.be/${videoId}&lang=zh-TW`;
                let res = await fetch(url, {
                    headers: { 'x-api-key': SUPADATA_API_KEY }
                });

                if (!res.ok) {
                    url = `https://api.supadata.ai/v1/transcript?url=https://youtu.be/${videoId}&lang=en`;
                    res = await fetch(url, {
                        headers: { 'x-api-key': SUPADATA_API_KEY }
                    });
                }

                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(`Supadata 錯誤 ${res.status}: ${errText}`);
                }

                const data = await res.json();
                const text = data.map(entry => entry.text || '').join(' ').trim();
                return text || '無可用字幕';
            } catch (err) {
                console.error('Transcript 錯誤:', err);
                return '無法取得逐字稿（' + err.message + '）';
            }
        }

        async function summarizeTranscript(transcript) {
            try {
                const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${OPENROUTER_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'moonshotai/kimi-k2.5',
                        messages: [
                            {
                                role: 'system',
                                content: '你是一位專業的繁體中文摘要專家。用條列式大綱精簡總結以下 YouTube 影片逐字稿，重點突出關鍵資訊、數據、結論，每點不超過 30 字，總長控制在 300 字內。語言自然、邏輯清晰。'
                            },
                            { role: 'user', content: transcript.substring(0, 8000) }
                        ],
                        temperature: 0.3,
                        max_tokens: 500
                    })
                });
                if (!res.ok) throw new Error('OpenRouter 錯誤: ' + res.status);
                const data = await res.json();
                return data.choices[0].message.content.trim();
            } catch (err) {
                console.error('摘要錯誤:', err);
                return '無法產生 AI 摘要';
            }
        }

        async function loadReader() {
            const status = document.getElementById('reader-status');
            const listDiv = document.getElementById('video-list');

            if (status.textContent.includes('載入中')) return;

            status.textContent = '載入中...';
            listDiv.innerHTML = '';

            let allVideos = [];
            const seen = new Set();

            for (const ch of CHANNELS) {
                const vids = await getLatestVideos(ch.id, 1);  // 每個頻道只取 1 則
                const unique = vids.filter(v => !seen.has(v.videoId));
                unique.forEach(v => seen.add(v.videoId));
                allVideos.push(...unique);
            }

            if (allVideos.length === 0) {
                status.textContent = '無內容或錯誤';
                listDiv.innerHTML = '<p>請確認 Channel ID、YouTube/OpenRouter/Supadata key</p>';
                return;
            }

            allVideos.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));

            listDiv.innerHTML = '';
            allVideos.forEach(video => {
                const div = document.createElement('div');
                div.className = 'video-item';
                div.innerHTML = `
                    <img src="${video.thumbnail}" alt="${video.title}">
                    <h3>${video.title}</h3>
                    <p>${video.channelName} | ${video.publishedAt}</p>
                    <a href="https://youtu.be/${video.videoId}" target="_blank">觀看原影片</a>
                    <button onclick="loadTranscriptForVideo('${video.videoId}')">載入逐字稿 & AI 摘要</button>
                    <div class="transcript" id="trans-${video.videoId}">逐字稿：未載入</div>
                    <div class="summary" id="sum-${video.videoId}">AI 摘要：未載入</div>
                `;
                listDiv.appendChild(div);
            });

            status.textContent = `完成（${allVideos.length} 則）`;
        }

        // 單一影片載入逐字稿 & 摘要（手動觸發）
        async function loadTranscriptForVideo(videoId) {
            const tDiv = document.getElementById(`trans-${videoId}`);
            const sDiv = document.getElementById(`sum-${videoId}`);
            tDiv.textContent = '逐字稿載入中...';
            sDiv.textContent = 'AI 摘要載入中...';

            const transText = await getTranscript(videoId);
            tDiv.innerHTML = `
                <strong>逐字稿：</strong><br>
                <div style="white-space:pre-wrap;">${transText.slice(0,800)}${transText.length>800?'...':''}</div>
            `;
            if (transText.length > 800) {
                const btn = document.createElement('button');
                btn.textContent = '顯示全部逐字稿';
                btn.onclick = () => {
                    tDiv.innerHTML += `<div style="white-space:pre-wrap;">${transText}</div>`;
                    btn.remove();
                };
                tDiv.appendChild(btn);
            }

            if (transText.length > 20) {
                const summary = await summarizeTranscript(transText);
                sDiv.innerHTML = `
                    <strong>AI 摘要（繁體中文大綱）：</strong><br>
                    <div style="white-space:pre-wrap;">${summary}</div>
                `;
            } else {
                sDiv.textContent = '內容太短，無需摘要';
            }
        }

        function loadLatestVideo() {
            const status = document.getElementById('status');
            status.textContent = '正在載入最新視頻...';
            document.getElementById('player').innerHTML = '';

            fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=UCtSCw2_rVZKXb_8Uo9trStQ&maxResults=1&order=date&type=video&key=${YOUTUBE_API_KEY}`)
                .then(res => {
                    if (!res.ok) throw new Error('API 失敗');
                    return res.json();
                })
                .then(data => {
                    if (data.items?.length > 0) {
                        const item = data.items[0];
                        const videoId = item.id.videoId;
                        status.textContent = `正在播放: ${item.snippet.title}`;

                        player = new YT.Player('player', {
                            height: '100%',
                            width: '100%',
                            videoId: videoId,
                            playerVars: { autoplay: 1, mute: 0, playsinline: 1, rel: 0, modestbranding: 1 },
                            events: { 'onReady': e => e.target.playVideo() }
                        });
                    } else {
                        status.textContent = '無最新視頻';
                    }
                })
                .catch(e => status.textContent = '載入失敗: ' + e);
        }

        loadLatestVideo();

        document.getElementById('refreshBtn').addEventListener('click', loadLatestVideo);
        document.getElementById('refresh-reader').addEventListener('click', loadReader);
    </script>
</body>
</html>
