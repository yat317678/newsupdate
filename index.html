<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的YouTube新聞廣播器</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        #player { width: 100%; max-width: 800px; height: 450px; margin: 20px auto; border: 1px solid #ccc; }
        #status { font-size: 18px; margin: 20px; color: #333; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>自動播放最新內容（@nullmicgo）</h1>
    <div id="player"></div>
    <p id="status">正在載入最新視頻...</p>
    <button id="refreshBtn">重新載入最新</button>

<script>
    function loadLatestVideo() {
        document.getElementById('status').textContent = '正在從 YouTube API 載入最新視頻...';
        document.getElementById('player').innerHTML = '';

        const API_KEY = 'AIzaSyDrloDZ0w8qFvwVYi_w-xJ-yJd8bigNa9I';  // ← 你的完整 Key 放這裡，用引號！
        const CHANNEL_ID = 'UCtSCw2_rVZKXb_8Uo9trStQ';

        const apiUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&maxResults=1&order=date&type=video&key=${API_KEY}`;

        fetch(apiUrl)
            .then(response => {
                if (!response.ok) {
                    return response.json().then(err => {
                        throw new Error(`API 錯誤 ${response.status}: ${err.error?.message || '未知'}`);
                    });
                }
                return response.json();
            })
            .then(data => {
                if (data.items && data.items.length > 0) {
                    const item = data.items[0];
                    const videoId = item.id.videoId;
                    const title = item.snippet.title;

                    document.getElementById('status').textContent = `正在播放: ${title}`;

                    const iframe = document.createElement('iframe');
                    iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&playsinline=1&rel=0&modestbranding=1&controls=0`;
                    iframe.width = '100%';
                    iframe.height = '100%';
                    iframe.frameBorder = '0';
                    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen';
                    iframe.allowFullscreen = true;
                    document.getElementById('player').appendChild(iframe);
                } else {
                    document.getElementById('status').textContent = '暫無最新視頻。';
                }
            })
            .catch(error => {
                console.error('錯誤:', error);
                document.getElementById('status').textContent = '載入失敗：' + error.message;
            });
    }

    loadLatestVideo();
</script>
</body>
</html>
