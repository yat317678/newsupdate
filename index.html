<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的YouTube新聞廣播器 & RSS閱讀器</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        .tab-buttons { text-align: center; margin: 20px 0; }
        .tab-buttons button {
            padding: 10px 20px;
            margin: 0 10px;
            font-size: 18px;
            cursor: pointer;
            background: #ddd;
            border: none;
            border-radius: 5px;
        }
        .tab-buttons button.active { background: #4CAF50; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #player { width: 100%; max-width: 800px; height: 450px; margin: 20px auto; border: 1px solid #ccc; }
        #status, #reader-status { font-size: 18px; margin: 20px; color: #333; }
        .video-list { max-width: 800px; margin: 0 auto; }
        .video-item {
            border: 1px solid #ccc;
            margin: 15px 0;
            padding: 15px;
            border-radius: 8px;
            background: white;
            text-align: left;
        }
        .video-item img { max-width: 100%; height: auto; border-radius: 5px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>

    <div class="tab-buttons">
        <button id="tab-broadcast" class="active">廣播器（自動播放）</button>
        <button id="tab-reader">RSS 閱讀器</button>
    </div>

    <div id="broadcast-content" class="tab-content active">
        <h1>自動播放最新內容（@nullmicgo）</h1>
        <div id="player"></div>
        <p id="status">正在載入最新視頻...</p>
        <button id="refreshBtn">重新載入最新</button>
    </div>

    <div id="reader-content" class="tab-content">
        <h1>RSS 閱讀器 - 最新影片列表</h1>
        <p id="reader-status">點擊「RSS 閱讀器」tab 後會自動載入多頻道最新影片...</p>
        <div id="video-list" class="video-list"></div>
        <button id="refresh-reader">重新整理閱讀器</button>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const API_KEY = 'AIzaSyDrloDZ0w8qFvwVYi_w-xJ-yJd8bigNa9I';  // ← 確保這裡是你的真實 Key，用引號包住

        // 多頻道列表（填入 AInvest 的 Channel ID）
        const CHANNELS = [
            { id: 'UCtSCw2_rVZKXb_8Uo9trStQ', name: 'nullmicgo' },
            { id: 'UC6ly-Z341muZIdYGp5LGyBw', name: 'AInvest Official' }  // ← 這裡填你查到的 AInvest Channel ID，例如 UC...（24位）
        ];

        let player;  // 全局 player 變數

        // Tab 切換
        document.getElementById('tab-broadcast').addEventListener('click', () => {
            document.getElementById('broadcast-content').classList.add('active');
            document.getElementById('reader-content').classList.remove('active');
            document.getElementById('tab-broadcast').classList.add('active');
            document.getElementById('tab-reader').classList.remove('active');
        });

        document.getElementById('tab-reader').addEventListener('click', () => {
            document.getElementById('reader-content').classList.add('active');
            document.getElementById('broadcast-content').classList.remove('active');
            document.getElementById('tab-reader').classList.add('active');
            document.getElementById('tab-broadcast').classList.remove('active');
            loadReader();  // 切到閱讀器時自動載入
        });

        // 取得最新影片列表
        async function getLatestVideos(channelId, max = 3) {
            try {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=${max}&order=date&type=video&key=${API_KEY}`;
                const response = await fetch(url);
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || `HTTP ${response.status}`);
                }
                const data = await response.json();
                return data.items.map(item => ({
                    videoId: item.id.videoId,
                    title: item.snippet.title,
                    publishedAt: new Date(item.snippet.publishedAt).toLocaleString('zh-TW'),
                    thumbnail: item.snippet.thumbnails.medium.url,
                    channelName: CHANNELS.find(c => c.id === channelId)?.name || '未知頻道'
                }));
            } catch (error) {
                console.error(`頻道 ${channelId} 錯誤:`, error);
                return [];
            }
        }

        // 載入閱讀器內容
        async function loadReader() {
            const status = document.getElementById('reader-status');
            const listDiv = document.getElementById('video-list');
            status.textContent = '正在載入多頻道最新影片...';
            listDiv.innerHTML = '';

            let allVideos = [];
            let errorMsg = '';

            for (const channel of CHANNELS) {
                const videos = await getLatestVideos(channel.id, 3);
                if (videos.length > 0) {
                    allVideos = allVideos.concat(videos);
                } else {
                    errorMsg += `頻道 ${channel.name} 無內容或錯誤。<br>`;
                }
            }

            if (allVideos.length === 0) {
                status.textContent = '載入完成，但暫無內容。';
                listDiv.innerHTML = `<p>錯誤詳情：${errorMsg || '請檢查 API Key、Channel ID 是否正確，或網路連線。Quota 可能已用完。'}</p>`;
                return;
            }

            // 按發布時間排序（最新在上）
            allVideos.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));

            listDiv.innerHTML = '';
            allVideos.forEach(video => {
                const item = document.createElement('div');
                item.className = 'video-item';
                item.innerHTML = `
                    <img src="${video.thumbnail}" alt="${video.title}">
                    <h3>${video.title}</h3>
                    <p>頻道：${video.channelName} | 發布：${video.publishedAt}</p>
                    <p><a href="https://www.youtube.com/watch?v=${video.videoId}" target="_blank">觀看原影片</a></p>
                `;
                listDiv.appendChild(item);
            });
            status.textContent = '載入完成';
        }

        // 載入廣播器最新影片（使用 IFrame API）
        function loadLatestVideo() {
            const status = document.getElementById('status');
            status.textContent = '正在從 YouTube API 載入最新視頻...';
            document.getElementById('player').innerHTML = '';  // 清空舊 player

            fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=UCtSCw2_rVZKXb_8Uo9trStQ&maxResults=1&order=date&type=video&key=${API_KEY}`)
                .then(response => {
                    if (!response.ok) throw new Error('API 請求失敗：' + response.status);
                    return response.json();
                })
                .then(data => {
                    if (data.items && data.items.length > 0) {
                        const item = data.items[0];
                        const videoId = item.id.videoId;
                        const title = item.snippet.title;

                        status.textContent = `正在播放: ${title}`;

                        // 使用 IFrame Player API
                        player = new YT.Player('player', {
                            height: '100%',
                            width: '100%',
                            videoId: videoId,
                            playerVars: {
                                autoplay: 1,
                                mute: 0,
                                playsinline: 1,
                                rel: 0,
                                modestbranding: 1
                            },
                            events: {
                                'onReady': function(event) {
                                    event.target.playVideo();
                                    // event.target.setPlaybackRate(0.75);  // 如果要減速，取消註解
                                }
                            }
                        });
                    } else {
                        status.textContent = '暫無最新視頻。';
                    }
                })
                .catch(error => {
                    console.error('錯誤:', error);
                    status.textContent = '載入失敗：' + error.message + '（檢查 API Key 或網路）';
                });
        }

        // 頁面載入時自動執行廣播器
        loadLatestVideo();

        // 重新載入按鈕
        document.getElementById('refreshBtn').addEventListener('click', loadLatestVideo);
        document.getElementById('refresh-reader').addEventListener('click', loadReader);
    </script>
</body>
</html>
